```html
<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninja Pecahan</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    text-align:center;
    background:linear-gradient(#87CEEB,#d4f4dd);
    overflow:hidden;
}

h1{
    color:#b22222;
}

#hud{
    display:flex;
    justify-content:space-around;
    font-size:24px;
    margin:10px;
    font-weight:bold;
}

#gameArea{
    margin-top:30px;
}

.fruit{
    display:inline-block;
    width:180px;
    height:180px;
    margin:20px;
    border-radius:20px;
    background:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    cursor:pointer;
    transition:0.3s;
    font-size:60px;
    padding-top:20px;
}

.fruit:hover{
    transform:scale(1.05);
}

.frac{
    font-size:36px;
    margin-top:15px;
}

#ninja{
    font-size:90px;
    position:fixed;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    transition:0.4s;
}

.jump{
    transform:translateX(-50%) translateY(-120px);
}

#feedback{
    font-size:32px;
    color:#006400;
    height:50px;
    margin-top:20px;
}

#nextBtn{
    display:none;
    padding:12px 25px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#ff9800;
    color:white;
    cursor:pointer;
}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    from{transform:translateY(-20px);}
    to{transform:translateY(700px);}
}
</style>
</head>

<body>

<h1>🥷 Ninja Pecahan</h1>

<div id="hud">
<div>⭐ Skor: <span id="score">0</span></div>
<div>⏱ Masa: <span id="time">60</span></div>
<div>📚 Tahap: 1</div>
</div>

<div id="gameArea"></div>

<div id="feedback"></div>

<button id="nextBtn" onclick="nextQuestion()">
➡️ Soalan Seterusnya
</button>

<div id="ninja">🥷</div>

<script>

const questions = [
 {a:"3/8", b:"5/8"},
 {a:"2/6", b:"4/6"},
 {a:"1/5", b:"3/5"},
 {a:"4/7", b:"6/7"}
];

const fruits=["🍎","🍊","🍉","🍌"];

let current=0;
let score=0;
let time=60;
let answered=false;

const sliceSound = new Audio("audio/slice.mp3");
const successSound = new Audio("audio/success.mp3");
const wrongSound = new Audio("audio/wrong.mp3");

function value(frac){
    let p=frac.split("/");
    return Number(p[0])/Number(p[1]);
}

function showQuestion(){

    answered=false;

    if(current>=questions.length){
        document.getElementById("gameArea").innerHTML=
        "<h2>🏆 Tahniah! Tahap Selesai!</h2>";
        document.getElementById("nextBtn").style.display="none";
        return;
    }

    let q=questions[current];

    let fruit1=fruits[Math.floor(Math.random()*fruits.length)];
    let fruit2=fruits[Math.floor(Math.random()*fruits.length)];

    document.getElementById("gameArea").innerHTML=`
    <div class='fruit' onclick="answer('${q.a}','${q.b}','a')">
        ${fruit1}
        <div class='frac'>${q.a}</div>
    </div>

    <span style="font-size:40px;">VS</span>

    <div class='fruit' onclick="answer('${q.a}','${q.b}','b')">
        ${fruit2}
        <div class='frac'>${q.b}</div>
    </div>`;
}

function answer(a,b,choice){

    if(answered) return;
    answered=true;

    let correct = value(a)>value(b) ? "a":"b";

    document.getElementById("ninja").classList.add("jump");

    setTimeout(()=>{
        document.getElementById("ninja").classList.remove("jump");
    },500);

    sliceSound.currentTime=0;
    sliceSound.play();

    if(choice===correct){

        successSound.currentTime=0;
        successSound.play();

        score+=10;
        document.getElementById("feedback").innerHTML=
        "🎉 Hebat! Tahniah Ninja! +10";

        confetti();

    }else{

        wrongSound.currentTime=0;
        wrongSound.play();

        score-=5;
        document.getElementById("feedback").innerHTML=
        "❌ Cuba Lagi! -5";
    }

    document.getElementById("score").innerText=score;

    document.getElementById("nextBtn").style.display="inline-block";
}

function nextQuestion(){
    current++;
    document.getElementById("feedback").innerHTML="";
    document.getElementById("nextBtn").style.display="none";
    showQuestion();
}

function confetti(){

    for(let i=0;i<50;i++){

        let c=document.createElement("div");
        c.className="confetti";

        c.style.left=Math.random()*window.innerWidth+"px";

        c.style.background=
        ["red","blue","green","yellow","purple"]
        [Math.floor(Math.random()*5)];

        document.body.appendChild(c);

        setTimeout(()=>c.remove(),3000);
    }
}

setInterval(()=>{
    time--;
    document.getElementById("time").innerText=time;

    if(time<=0){
        alert("⏰ Masa Tamat! Skor Akhir: "+score);
        location.reload();
    }
},1000);

showQuestion();

</script>

</body>
</html>
